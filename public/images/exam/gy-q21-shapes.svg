<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <style>
    text { font-family: system-ui, sans-serif; fill: #374151; }
    .shape { fill: none; stroke: #3b82f6; stroke-width: 2; }
    .number { font-size: 20px; font-weight: bold; }
    .arrow { font-size: 18px; fill: #6b7280; }
  </style>
  <!-- Triangle ? 3 -->
  <polygon points="40,15 20,55 60,55" class="shape"/>
  <text x="75" y="42" class="arrow">&#x2192;</text>
  <text x="95" y="45" class="number">3</text>

  <!-- Separator -->
  <text x="125" y="42" fill="#d1d5db" font-size="24">|</text>

  <!-- Square ? 4 -->
  <rect x="145" y="15" width="40" height="40" class="shape"/>
  <text x="200" y="42" class="arrow">&#x2192;</text>
  <text x="220" y="45" class="number">4</text>

  <!-- Separator -->
  <text x="250" y="42" fill="#d1d5db" font-size="24">|</text>

  <!-- Question mark ? 6 -->
  <text x="290" y="48" font-size="36" fill="#ef4444" font-weight="bold">?</text>
  <text x="325" y="42" class="arrow">&#x2192;</text>
  <text x="345" y="45" class="number">6</text>
</svg>
