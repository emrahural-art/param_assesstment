<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <style>
    text { font-family: system-ui, sans-serif; font-size: 11px; fill: #374151; }
    .label { font-size: 10px; fill: #6b7280; }
    .arrow { fill: none; stroke: #6b7280; stroke-width: 1.5; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6b7280"/>
    </marker>
  </defs>
  <!-- Step 1: Original square -->
  <rect x="10" y="30" width="80" height="80" fill="#e0f2fe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="50" y="125" text-anchor="middle" class="label">Orijinal</text>

  <!-- Arrow -->
  <line x1="105" y1="70" x2="135" y2="70" class="arrow"/>

  <!-- Step 2: Vertical fold -->
  <rect x="145" y="30" width="40" height="80" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="185" y1="30" x2="185" y2="110" stroke="#3b82f6" stroke-dasharray="4,3"/>
  <text x="165" y="125" text-anchor="middle" class="label">Dikey Kat</text>

  <!-- Arrow -->
  <line x1="200" y1="70" x2="230" y2="70" class="arrow"/>

  <!-- Step 3: Horizontal fold (4 layers) -->
  <rect x="240" y="50" width="40" height="40" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="240" y1="50" x2="280" y2="50" stroke="#3b82f6" stroke-dasharray="4,3"/>
  <text x="260" y="105" text-anchor="middle" class="label">Yatay Kat</text>
  <text x="260" y="117" text-anchor="middle" class="label">(4 katman)</text>

  <!-- Arrow -->
  <line x1="295" y1="70" x2="325" y2="70" class="arrow"/>

  <!-- Step 4: Cuts -->
  <rect x="335" y="50" width="40" height="40" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Triangle cut on closed corner -->
  <polygon points="335,50 335,62 347,50" fill="white" stroke="#ef4444" stroke-width="1"/>
  <!-- Semicircle on open edge -->
  <path d="M375,60 A8,8 0 0,0 375,80" fill="white" stroke="#ef4444" stroke-width="1"/>
  <text x="355" y="105" text-anchor="middle" class="label">Kesimler</text>
  <text x="340" y="45" class="label" font-size="9">��gen</text>
  <text x="378" y="73" class="label" font-size="9">Yar?m daire</text>

  <!-- Arrow -->
  <line x1="390" y1="70" x2="410" y2="70" class="arrow"/>

  <!-- Step 5: Unfolded result -->
  <rect x="420" y="20" width="70" height="70" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="455" y="58" text-anchor="middle" fill="#ef4444" font-size="16">?</text>
  <text x="455" y="105" text-anchor="middle" class="label">A�?ld???nda</text>
</svg>
